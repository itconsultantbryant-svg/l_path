# Backend API only — frontend is deployed separately on Vercel.
# See DEPLOYMENT.md for full Vercel + Render setup.

services:
  - type: web
    name: liberty-path-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    preDeployCommand: npm run migrate && npm run seed
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "5000"
      - key: API_VERSION
        value: v1
      - key: SERVE_FRONTEND
        value: "false"
      # Set to your Vercel URL(s), comma-separated, e.g. https://libertypath.site,https://your-app.vercel.app
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_DOMAIN_SUFFIXES
        value: "libertypath.site,vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: liberty-path-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SERVICE_FEE_PERCENTAGE
        value: "15"
      - key: MIN_WITHDRAWAL_AMOUNT
        value: "500"
      - key: MAX_WITHDRAWAL_PER_WEEK
        value: "15000"
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"

databases:
  - name: liberty-path-db
    plan: free
